# Production application container only.
#
# Bring your own reverse proxy / HTTPS layer (Caddy, Nginx, Traefik,
# Cloudflare Tunnel, 1Panel, etc.) and forward traffic to the app service.
#
# Quick start:
#   1. cp .env.example .env   # edit APP_SESSION_SECRET, APP_BASE_URL
#   2. docker compose up -d
#   3. Point your reverse proxy to http://app:8080 inside this compose network
#      or publish the port explicitly if your proxy runs outside Docker.
#
# Data persists in the Docker volume (homepage_data).

services:
  app:
    build: .
    restart: unless-stopped
    volumes:
      - homepage_data:/data
    environment:
      - APP_ENV=production
      - APP_SESSION_SECRET=${APP_SESSION_SECRET:?required}
      - APP_BASE_URL=${APP_BASE_URL:-https://localhost}
      - APP_TRUSTED_PROXY_CIDRS=${APP_TRUSTED_PROXY_CIDRS:-}
      - APP_COOKIE_SECURE=true
      - APP_SETUP_ENABLED=${APP_SETUP_ENABLED:-false}
      - APP_SETUP_TOKEN=${APP_SETUP_TOKEN:-}
      - APP_LOG_FORMAT=json
    expose:
      - "8080"
    # Uncomment if your reverse proxy runs on the host instead of this compose network.
    # ports:
    #   - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  homepage_data:
